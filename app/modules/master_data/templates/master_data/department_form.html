{% extends "layout/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('master_data.department_list') }}">Departments</a></li>
<li class="breadcrumb-item active">{{ title }}</li>
{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>
<div class="card"><div class="card-body">
<form method="post" class="row g-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-md-4"><label class="form-label">Code</label>
    <input type="text" name="code" class="form-control text-uppercase"
           value="{{ item.code if item else '' }}" {{ 'readonly' if item }} required></div>
  <div class="col-md-8"><label class="form-label">Name</label>
    <input type="text" name="name" class="form-control"
           value="{{ item.name if item else '' }}" required></div>
  <div class="col-md-6"><label class="form-label">Branch</label>
    <select name="branch_id" class="form-select fms-select2" {{ 'disabled' if item }} required>
      <option value="">— Select branch —</option>
      {% for b in branches %}
      <option value="{{ b.id }}" {{ 'selected' if item and item.branch_id==b.id }}>{{ b.name }}</option>
      {% endfor %}
    </select>
    {% if item %}<div class="form-text">Branch cannot be changed after creation.</div>{% endif %}
  </div>
  <div class="col-12"><label class="form-label">Description</label>
    <input type="text" name="description" class="form-control"
           value="{{ item.description if item else '' }}"></div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('master_data.department_list') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
