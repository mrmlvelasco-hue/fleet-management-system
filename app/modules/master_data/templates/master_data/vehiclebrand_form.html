{% extends "layout/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('master_data.vehiclebrand_list') }}">Vehicle Brands</a></li>
<li class="breadcrumb-item active">{{ title }}</li>
{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>
<div class="card"><div class="card-body">
<form method="post" class="row g-3" autocomplete="off">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-md-8"><label class="form-label">Name</label>
    <input type="text" name="name" class="form-control" autocomplete="off" required
           value="{{ item.name if item else '' }}" placeholder="e.g. Toyota"></div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('master_data.vehiclebrand_list') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
