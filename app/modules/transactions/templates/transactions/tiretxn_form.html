{% extends "layout/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('transactions.tiretxn_list') }}">Tire Transactions</a></li>
<li class="breadcrumb-item active">{{ title }}</li>
{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>
<div class="card"><div class="card-body">
<form method="post" class="row g-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-md-6"><label class="form-label">Tire</label>
    <select name="tire_id" class="form-select fms-select2" required>
      <option value="">— Select tire —</option>
      {% for t in tires %}<option value="{{ t.id }}">{{ t.serial_number }} — {{ t.brand }} {{ t.size }}</option>{% endfor %}
    </select></div>
  <div class="col-md-6"><label class="form-label">Action</label>
    <select name="action" class="form-select" required>
      <option value="MOUNT">Mount</option>
      <option value="DISMOUNT">Dismount</option>
      <option value="RETREAD">Retread</option>
      <option value="DISPOSE">Dispose</option>
    </select></div>
  <div class="col-md-6"><label class="form-label">Vehicle (required for Mount)</label>
    <select name="vehicle_id" id="tirtxVehicleSelect" class="form-select">
      <option value="">— Type plate number, make, or model —</option>
    </select></div>
  <div class="col-md-6"><label class="form-label">Transaction Date</label>
    <input type="date" name="transaction_date" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Odometer at Service</label>
    <input type="number" name="odometer_at_service" class="form-control"></div>
  <div class="col-12"><label class="form-label">Remarks</label>
    <textarea name="remarks" class="form-control" rows="2"></textarea></div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('transactions.tiretxn_list') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
{% block scripts %}
<script>
  if (window.jQuery) {
    jQuery(function () {
      initAjaxSelect("#tirtxVehicleSelect", "{{ url_for('api_search.search_vehicles') }}",
        { placeholder: "Type plate number, make, or model...", allowClear: true });
    });
  }
</script>
{% endblock %}
