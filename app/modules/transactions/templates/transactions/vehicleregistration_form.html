{% extends "layout/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('transactions.vehicleregistration_list') }}">Vehicle Registrations</a></li>
<li class="breadcrumb-item active">{{ title }}</li>
{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>
<div class="card"><div class="card-body">
<form method="post" class="row g-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-md-6"><label class="form-label">Vehicle</label>
    <select name="vehicle_id" class="form-select fms-select2" required>
      <option value="">— Select vehicle —</option>
      {% for v in vehicles %}
      <option value="{{ v.id }}">{{ v.plate_number or v.conduction_number }} — {{ v.brand }} {{ v.model }}</option>
      {% endfor %}
    </select></div>
  <div class="col-md-6"><label class="form-label">Registration Type</label>
    <select name="registration_type" class="form-select" required>
      <option value="NEW">New (3-year validity)</option>
      <option value="RENEWAL">Renewal (1-year validity)</option>
    </select></div>
  <div class="col-md-6"><label class="form-label">Registration Date</label>
    <input type="date" name="registration_date" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">OR/CR Cost (optional)</label>
    <input type="number" step="0.01" name="or_cr_cost" class="form-control"></div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Save as Draft</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('transactions.vehicleregistration_list') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
