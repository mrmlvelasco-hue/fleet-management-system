{% extends "layout/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block breadcrumbs %}
<li class="breadcrumb-item"><a href="{{ url_for('transactions.atd_list') }}">Authority To Drive</a></li>
<li class="breadcrumb-item active">{{ title }}</li>
{% endblock %}
{% block content %}
<h1 class="h3 mb-4">{{ title }}</h1>
<div class="card"><div class="card-body">
<form method="post" class="row g-3">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="col-md-6"><label class="form-label">Vehicle</label>
    <div class="input-group">
      <select name="vehicle_id" id="atdVehicleSelect" class="form-select" required>
        <option value="">— Type plate number, make, or model —</option>
      </select>
      <button type="button" class="btn btn-outline-secondary" id="atdVehicleModalBtn" title="Advanced search">
        <i class="bi bi-search"></i></button>
    </div></div>
  <div class="col-md-6"><label class="form-label">Driver</label>
    <select name="driver_id" id="atdDriverSelect" class="form-select" required>
      <option value="">— Type employee number or name —</option>
    </select></div>
  <div class="col-12"><label class="form-label">Purpose</label>
    <input type="text" name="purpose" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Valid From</label>
    <input type="date" name="valid_from" class="form-control" required></div>
  <div class="col-md-6"><label class="form-label">Valid To</label>
    <input type="date" name="valid_to" class="form-control" required></div>
  <div class="col-12">
    <button class="btn btn-primary" type="submit">Save as Draft</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('transactions.atd_list') }}">Cancel</a>
  </div>
</form>
</div></div>
{% endblock %}
{% block scripts %}
<script>
  if (window.jQuery) {
    jQuery(function () {
      initAjaxSelect("#atdVehicleSelect", "{{ url_for('api_search.search_vehicles') }}",
        { placeholder: "Type plate number, make, or model..." });
      initAjaxSelect("#atdDriverSelect", "{{ url_for('api_search.search_drivers') }}",
        { placeholder: "Type employee number or name..." });
      wireVehicleSearchModal("atdVehicleModalBtn", "atdVehicleSelect",
        "{{ url_for('api_search.search_vehicles_table') }}");
    });
  }
</script>
{% endblock %}
