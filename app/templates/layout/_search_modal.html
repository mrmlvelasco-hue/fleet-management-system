{# Reusable Search Modal shell — one instance per page is enough; the JS
   component (openSearchModal in app.js) fills in columns/rows/filters per
   invocation. Include this once in base.html so every page has it. #}
<div class="modal fade" id="fmsSearchModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="fmsSearchModalTitle">Search</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="row g-2 mb-3">
          <div class="col-md-6">
            <input type="search" id="fmsSearchModalQuery" class="form-control"
                   placeholder="🔍 Search...">
          </div>
          <div class="col-md-6 d-flex gap-2" id="fmsSearchModalFilters"></div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover">
            <thead id="fmsSearchModalHead"></thead>
            <tbody id="fmsSearchModalBody">
              <tr><td class="text-center text-muted py-4">Type to search...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer d-flex justify-content-between align-items-center">
        <span class="small text-muted" id="fmsSearchModalSummary"></span>
        <nav>
          <ul class="pagination pagination-sm mb-0" id="fmsSearchModalPagination"></ul>
        </nav>
      </div>
    </div>
  </div>
</div>
